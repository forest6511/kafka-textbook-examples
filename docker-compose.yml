# Apache Kafka の教科書 — 共通の KRaft 単一ノード構成
#
# Apache Kafka 4.x の公式イメージ(apache/kafka)を KRaft モード(ZooKeeper 不要)で起動する。
# ホストの localhost:9092 から franz-go / CLI で接続できる。
#
#   docker compose up -d         # 起動
#   docker compose down          # 停止
#   docker compose down -v       # 停止 + データ削除
#
# 構成は Apache Kafka 公式の single-node plaintext 例に準拠:
#   https://github.com/apache/kafka/tree/trunk/docker/examples
#
# 複数ブローカー構成は各章(ch09-operations 等)のディレクトリに別途用意する。

services:
  broker:
    image: apache/kafka:4.3.1
    hostname: broker
    container_name: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENERS: "PLAINTEXT://:19092,PLAINTEXT_HOST://:9092,CONTROLLER://:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:19092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
